<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Maths Trainer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Geist:wght@400;500;600&family=Geist+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Apply saved theme before React mounts so night mode doesn't flash light.
      try {
        if (localStorage.getItem('maths-trainer:theme') === 'dark')
          document.documentElement.setAttribute('data-theme', 'dark');
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
